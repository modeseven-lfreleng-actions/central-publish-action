# SPDX-FileCopyrightText: 2026 The Linux Foundation
---
name: "Central Publish Action"
description: >-
  Publish Maven artifacts to Maven Central via the Central Portal REST API.
  Optionally signs artifacts with GPG (signing-method=gpg) or accepts artifacts
  pre-signed via sigul (signing-method=sigul), creates a bundle ZIP, uploads to
  Central Portal, and polls for deployment status.

inputs:
  m2repo-path:
    description: "Path to local Maven repository directory containing artifacts"
    required: true
    default: "m2repo"
  central-username:
    description: "Central Portal token username"
    required: true
  central-token:
    description: "Central Portal token password"
    required: true
  signing-method:
    description: >-
      How artifacts are signed: 'gpg' (this action imports gpg-private-key and
      signs), 'sigul' (artifacts MUST be pre-signed by the caller, e.g. via
      lfit/sigul-sign-action, before this action runs — it only verifies the
      .asc files exist), or 'none' (no signing; for dry-run / non-Central use).
    required: false
    default: "gpg"
  gpg-private-key:
    description: >-
      GPG private key (base64 encoded, armor format). Required only when
      signing-method is 'gpg'.
    required: false
    default: ""
  gpg-passphrase:
    description: "GPG key passphrase (empty if no passphrase)"
    required: false
    default: ""
  publishing-type:
    description: "AUTOMATIC (auto-publish) or USER_MANAGED (validate only)"
    required: false
    default: "USER_MANAGED"
  dry-run:
    description: "If true, create bundle but skip upload"
    required: false
    default: "false"
  poll-timeout:
    description: "Max seconds to wait for deployment validation"
    required: false
    default: "600"
  poll-interval:
    description: "Seconds between status polls"
    required: false
    default: "15"

outputs:
  deployment_id:
    description: "Central Portal deployment ID"
    value: ${{ steps.upload.outputs.deployment_id }}
  deployment_status:
    description: "Final deployment status"
    value: ${{ steps.poll.outputs.deployment_status }}
  bundle_path:
    description: "Path to created bundle ZIP"
    value: ${{ steps.bundle.outputs.bundle_path }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      id: validate
      shell: bash
      env:
        INPUT_M2REPO: "${{ inputs.m2repo-path }}"
        INPUT_SIGNING_METHOD: "${{ inputs.signing-method }}"
        INPUT_GPG_KEY_PROVIDED: "${{ inputs.gpg-private-key != '' }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="$INPUT_M2REPO"
        SIGNING_METHOD="$INPUT_SIGNING_METHOD"

        case "$SIGNING_METHOD" in
          gpg|sigul|none) ;;
          *)
            echo "::error::Invalid signing-method '$SIGNING_METHOD' (expected: gpg, sigul, or none)"
            exit 1
            ;;
        esac

        if [ "$SIGNING_METHOD" = "gpg" ] && [ "$INPUT_GPG_KEY_PROVIDED" != "true" ]; then
          echo "::error::signing-method is 'gpg' but gpg-private-key is empty"
          exit 1
        fi

        if [ ! -d "$M2REPO" ]; then
          echo "::error::m2repo-path '$M2REPO' does not exist or is not a directory"
          exit 1
        fi

        ARTIFACT_COUNT=$(find "$M2REPO" -name "*.pom" | wc -l)
        if [ "$ARTIFACT_COUNT" -eq 0 ]; then
          echo "::error::No .pom files found in '$M2REPO' — is this a valid Maven repo?"
          exit 1
        fi

        echo "Signing method: $SIGNING_METHOD"
        echo "Found $ARTIFACT_COUNT POM(s) in $M2REPO"
        echo "artifact-count=$ARTIFACT_COUNT" >> "$GITHUB_OUTPUT"

    - name: Import GPG key
      id: gpg
      if: inputs.signing-method == 'gpg'
      shell: bash
      env:
        INPUT_GPG_PRIVATE_KEY: "${{ inputs.gpg-private-key }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        printf '%s' "$INPUT_GPG_PRIVATE_KEY" | base64 -d | \
          gpg --batch --import 2>&1

        # Get the key ID
        KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | \
          grep "sec" | head -1 | awk -F'/' '{print $2}' | awk '{print $1}')

        if [ -z "$KEY_ID" ]; then
          echo "::error::Failed to import GPG key or no secret key found"
          exit 1
        fi

        echo "::add-mask::$KEY_ID"
        echo "Imported GPG key: ${KEY_ID:0:4}...${KEY_ID: -4}"
        echo "key-id=$KEY_ID" >> "$GITHUB_OUTPUT"

    - name: Sign artifacts
      id: sign
      if: inputs.signing-method == 'gpg'
      shell: bash
      env:
        GPG_KEY_ID: "${{ steps.gpg.outputs.key-id }}"
        GPG_PASSPHRASE: "${{ inputs.gpg-passphrase }}"
        INPUT_M2REPO: "${{ inputs.m2repo-path }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="$INPUT_M2REPO"
        SIGN_COUNT=0

        # Sign all .jar and .pom files
        find "$M2REPO" -type f \( -name "*.jar" -o -name "*.pom" -o -name "*.module" \) | \
        while read -r file; do
          if [ -f "${file}.asc" ]; then
            echo "  Skip (already signed): $(basename "$file")"
            continue
          fi

          if [ -n "$GPG_PASSPHRASE" ]; then
            gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_KEY_ID" --armor --detach-sign "$file"
          else
            gpg --batch --pinentry-mode loopback \
              --local-user "$GPG_KEY_ID" --armor --detach-sign "$file"
          fi

          SIGN_COUNT=$((SIGN_COUNT + 1))
        done

        ASC_COUNT=$(find "$M2REPO" -name "*.asc" | wc -l)
        echo "Signed artifacts: $ASC_COUNT .asc files created"
        echo "sign-count=$ASC_COUNT" >> "$GITHUB_OUTPUT"

    - name: Verify pre-signed artifacts
      id: verify-sign
      if: inputs.signing-method == 'sigul'
      shell: bash
      env:
        INPUT_M2REPO: "${{ inputs.m2repo-path }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="$INPUT_M2REPO"
        MISSING=0
        ASC_COUNT=0

        # Every deployable artifact (same set GPG would sign) MUST have a
        # detached signature produced by the caller (e.g. sigul-sign-action).
        while read -r file; do
          if [ -f "${file}.asc" ]; then
            ASC_COUNT=$((ASC_COUNT + 1))
          else
            echo "::error::Missing signature for $(basename "$file") (.asc not found)"
            MISSING=$((MISSING + 1))
          fi
        done < <(find "$M2REPO" -type f \
          \( -name "*.jar" -o -name "*.pom" -o -name "*.module" \))

        if [ "$MISSING" -gt 0 ]; then
          echo "::error::signing-method 'sigul' requires pre-signed artifacts, but $MISSING signature(s) are missing"
          exit 1
        fi

        echo "Verified $ASC_COUNT pre-signed artifact(s)"
        echo "sign-count=$ASC_COUNT" >> "$GITHUB_OUTPUT"

    - name: Create bundle ZIP
      id: bundle
      shell: bash
      env:
        INPUT_M2REPO: "${{ inputs.m2repo-path }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="$INPUT_M2REPO"
        BUNDLE_DIR="${GITHUB_WORKSPACE}/central-bundle"
        BUNDLE_PATH="${BUNDLE_DIR}/bundle.zip"
        mkdir -p "$BUNDLE_DIR"

        # Bundle must contain artifacts in Maven directory structure
        # (relative paths from the repo root)
        cd "$M2REPO"

        # Central Portal REQUIRES .md5 and .sha1 checksums for each artifact
        echo "Generating checksums..."
        find . -type f \
          ! -name "*.md5" ! -name "*.sha1" ! -name "*.sha256" ! -name "*.sha512" \
          ! -name "maven-metadata.xml*" ! -name "_remote.repositories" \
          | while read -r file; do
            md5sum "$file" | awk '{print $1}' > "${file}.md5"
            sha1sum "$file" | awk '{print $1}' > "${file}.sha1"
          done

        zip -r "$BUNDLE_PATH" . \
          -x "*.sha256" -x "*.sha512" \
          -x "maven-metadata.xml*" -x "_remote.repositories"

        BUNDLE_SIZE=$(stat -c%s "$BUNDLE_PATH" 2>/dev/null || stat -f%z "$BUNDLE_PATH")
        echo "Bundle created: $BUNDLE_PATH ($(numfmt --to=iec "$BUNDLE_SIZE"))"
        echo "bundle_path=$BUNDLE_PATH" >> "$GITHUB_OUTPUT"
        echo "bundle-size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"

    - name: Upload bundle to Central Portal
      id: upload
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        CENTRAL_USERNAME: "${{ inputs.central-username }}"
        CENTRAL_TOKEN: "${{ inputs.central-token }}"
        INPUT_PUBLISHING_TYPE: "${{ inputs.publishing-type }}"
        BUNDLE_PATH: "${{ steps.bundle.outputs.bundle_path }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        PUBLISHING_TYPE="$INPUT_PUBLISHING_TYPE"

        # Generate Bearer token: base64(username:password)
        AUTH_TOKEN=$(echo -n "${CENTRAL_USERNAME}:${CENTRAL_TOKEN}" | base64 -w0)
        echo "::add-mask::$AUTH_TOKEN"

        echo "Uploading bundle to Central Portal (publishingType=$PUBLISHING_TYPE)..."

        RESPONSE=$(curl -sf -X POST \
          "https://central.sonatype.com/api/v1/publisher/upload?publishingType=${PUBLISHING_TYPE}" \
          -H "Authorization: Bearer $AUTH_TOKEN" \
          -F "bundle=@${BUNDLE_PATH};type=application/octet-stream" \
          2>&1) || {
            echo "::error::Upload failed. Response: $RESPONSE"
            exit 1
          }

        # Response is just the deployment ID (plain text)
        DEPLOYMENT_ID="$RESPONSE"
        echo "Deployment ID: $DEPLOYMENT_ID"
        echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

    - name: Poll deployment status
      id: poll
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        CENTRAL_USERNAME: "${{ inputs.central-username }}"
        CENTRAL_TOKEN: "${{ inputs.central-token }}"
        INPUT_PUBLISHING_TYPE: "${{ inputs.publishing-type }}"
        INPUT_POLL_TIMEOUT: "${{ inputs.poll-timeout }}"
        INPUT_POLL_INTERVAL: "${{ inputs.poll-interval }}"
        DEPLOYMENT_ID: "${{ steps.upload.outputs.deployment_id }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        TIMEOUT="$INPUT_POLL_TIMEOUT"
        INTERVAL="$INPUT_POLL_INTERVAL"

        AUTH_TOKEN=$(echo -n "${CENTRAL_USERNAME}:${CENTRAL_TOKEN}" | base64 -w0)
        echo "::add-mask::$AUTH_TOKEN"

        echo "Polling deployment status (timeout: ${TIMEOUT}s, interval: ${INTERVAL}s)..."

        ELAPSED=0
        FINAL_STATUS="UNKNOWN"

        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          RESPONSE=$(curl -s -X POST \
            "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "  Poll request failed (HTTP $HTTP_CODE), retrying..."
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
            continue
          fi

          STATUS=$(echo "$BODY" | jq -r '.deploymentState // .state // "UNKNOWN"')
          echo "  [$ELAPSED s] Status: $STATUS"

          case "$STATUS" in
            PUBLISHED)
              FINAL_STATUS="PUBLISHED"
              echo "✅ Deployment PUBLISHED successfully!"
              break
              ;;
            VALIDATED)
              FINAL_STATUS="VALIDATED"
              if [ "$INPUT_PUBLISHING_TYPE" = "USER_MANAGED" ]; then
                echo "✅ Deployment VALIDATED (USER_MANAGED — not auto-published)"
                break
              fi
              echo "  Waiting for publication..."
              ;;
            FAILED)
              FINAL_STATUS="FAILED"
              echo "::error::Deployment FAILED"
              echo "$BODY" | jq '.errors // .' 2>/dev/null || echo "$BODY"
              exit 1
              ;;
            PENDING|VALIDATING|PUBLISHING)
              # Still in progress
              ;;
            *)
              echo "  Unknown status: $STATUS"
              ;;
          esac

          sleep "$INTERVAL"
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        if [ "$ELAPSED" -ge "$TIMEOUT" ] && [ "$FINAL_STATUS" != "PUBLISHED" ] && \
           [ "$FINAL_STATUS" != "VALIDATED" ]; then
          echo "::error::Timed out waiting for deployment (last status: $FINAL_STATUS)"
          exit 1
        fi

        echo "deployment_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        INPUT_SIGNING_METHOD: "${{ inputs.signing-method }}"
        INPUT_PUBLISHING_TYPE: "${{ inputs.publishing-type }}"
        INPUT_DRY_RUN: "${{ inputs.dry-run }}"
        SIGN_COUNT: "${{ steps.sign.outputs.sign-count || steps.verify-sign.outputs.sign-count || 'N/A' }}"
        ARTIFACT_COUNT: "${{ steps.validate.outputs.artifact-count }}"
        BUNDLE_SIZE: "${{ steps.bundle.outputs.bundle-size }}"
        DEPLOYMENT_ID: "${{ steps.upload.outputs.deployment_id || 'N/A (dry-run)' }}"
        DEPLOYMENT_STATUS: "${{ steps.poll.outputs.deployment_status || 'N/A' }}"
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        BUNDLE_SIZE_HUMAN="$(numfmt --to=iec "${BUNDLE_SIZE}" 2>/dev/null || echo 'N/A')"

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## Maven Central Publication

        | | |
        |---|---|
        | **Artifacts** | ${ARTIFACT_COUNT} POM(s) |
        | **Signing Method** | ${INPUT_SIGNING_METHOD} |
        | **Signatures** | ${SIGN_COUNT} .asc files |
        | **Bundle Size** | ${BUNDLE_SIZE_HUMAN} |
        | **Publishing Type** | ${INPUT_PUBLISHING_TYPE} |
        | **Dry Run** | ${INPUT_DRY_RUN} |
        | **Deployment ID** | ${DEPLOYMENT_ID} |
        | **Status** | ${DEPLOYMENT_STATUS} |
        EOF

branding:
  icon: "upload-cloud"
  color: "blue"
