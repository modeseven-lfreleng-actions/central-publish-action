# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation
---
name: "Central Publish Action"
description: >-
  Publish Maven artifacts to Maven Central via the Central Portal REST API.
  Signs artifacts with GPG, creates a bundle ZIP, uploads to Central Portal,
  and polls for deployment status.

inputs:
  m2repo-path:
    description: "Path to local Maven repository directory containing artifacts"
    required: true
    default: "m2repo"
  central-username:
    description: "Central Portal token username"
    required: true
  central-token:
    description: "Central Portal token password"
    required: true
  gpg-private-key:
    description: "GPG private key (base64 encoded, armor format)"
    required: true
  gpg-passphrase:
    description: "GPG key passphrase (empty if no passphrase)"
    required: false
    default: ""
  publishing-type:
    description: "AUTOMATIC (auto-publish) or USER_MANAGED (validate only)"
    required: false
    default: "USER_MANAGED"
  dry-run:
    description: "If true, create bundle but skip upload"
    required: false
    default: "false"
  poll-timeout:
    description: "Max seconds to wait for deployment validation"
    required: false
    default: "600"
  poll-interval:
    description: "Seconds between status polls"
    required: false
    default: "15"

outputs:
  deployment_id:
    description: "Central Portal deployment ID"
    value: ${{ steps.upload.outputs.deployment_id }}
  deployment_status:
    description: "Final deployment status"
    value: ${{ steps.poll.outputs.deployment_status }}
  bundle_path:
    description: "Path to created bundle ZIP"
    value: ${{ steps.bundle.outputs.bundle_path }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      id: validate
      shell: bash
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="${{ inputs.m2repo-path }}"
        if [ ! -d "$M2REPO" ]; then
          echo "::error::m2repo-path '$M2REPO' does not exist or is not a directory"
          exit 1
        fi

        ARTIFACT_COUNT=$(find "$M2REPO" -name "*.pom" | wc -l)
        if [ "$ARTIFACT_COUNT" -eq 0 ]; then
          echo "::error::No .pom files found in '$M2REPO' — is this a valid Maven repo?"
          exit 1
        fi

        echo "Found $ARTIFACT_COUNT POM(s) in $M2REPO"
        echo "artifact-count=$ARTIFACT_COUNT" >> "$GITHUB_OUTPUT"

    - name: Import GPG key
      id: gpg
      shell: bash
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        echo "${{ inputs.gpg-private-key }}" | base64 -d | \
          gpg --batch --import 2>&1

        # Get the key ID
        KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | \
          grep "sec" | head -1 | awk -F'/' '{print $2}' | awk '{print $1}')

        if [ -z "$KEY_ID" ]; then
          echo "::error::Failed to import GPG key or no secret key found"
          exit 1
        fi

        echo "::add-mask::$KEY_ID"
        echo "Imported GPG key: ${KEY_ID:0:4}...${KEY_ID: -4}"
        echo "key-id=$KEY_ID" >> "$GITHUB_OUTPUT"

    - name: Sign artifacts
      id: sign
      shell: bash
      env:
        GPG_KEY_ID: ${{ steps.gpg.outputs.key-id }}
        GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="${{ inputs.m2repo-path }}"
        SIGN_COUNT=0

        # Sign all .jar and .pom files
        find "$M2REPO" -type f \( -name "*.jar" -o -name "*.pom" -o -name "*.module" \) | \
        while read -r file; do
          if [ -f "${file}.asc" ]; then
            echo "  Skip (already signed): $(basename "$file")"
            continue
          fi

          if [ -n "$GPG_PASSPHRASE" ]; then
            gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_KEY_ID" --armor --detach-sign "$file"
          else
            gpg --batch --pinentry-mode loopback \
              --local-user "$GPG_KEY_ID" --armor --detach-sign "$file"
          fi

          SIGN_COUNT=$((SIGN_COUNT + 1))
        done

        ASC_COUNT=$(find "$M2REPO" -name "*.asc" | wc -l)
        echo "Signed artifacts: $ASC_COUNT .asc files created"
        echo "sign-count=$ASC_COUNT" >> "$GITHUB_OUTPUT"

    - name: Create bundle ZIP
      id: bundle
      shell: bash
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        M2REPO="${{ inputs.m2repo-path }}"
        BUNDLE_DIR="${GITHUB_WORKSPACE}/central-bundle"
        BUNDLE_PATH="${BUNDLE_DIR}/bundle.zip"
        mkdir -p "$BUNDLE_DIR"

        # Bundle must contain artifacts in Maven directory structure
        # (relative paths from the repo root)
        cd "$M2REPO"

        # Central Portal REQUIRES .md5 and .sha1 checksums for each artifact
        echo "Generating checksums..."
        find . -type f \
          ! -name "*.md5" ! -name "*.sha1" ! -name "*.sha256" ! -name "*.sha512" \
          ! -name "maven-metadata.xml*" ! -name "_remote.repositories" \
          | while read -r file; do
            md5sum "$file" | awk '{print $1}' > "${file}.md5"
            sha1sum "$file" | awk '{print $1}' > "${file}.sha1"
          done

        zip -r "$BUNDLE_PATH" . \
          -x "*.sha256" -x "*.sha512" \
          -x "maven-metadata.xml*" -x "_remote.repositories"

        BUNDLE_SIZE=$(stat -c%s "$BUNDLE_PATH" 2>/dev/null || stat -f%z "$BUNDLE_PATH")
        echo "Bundle created: $BUNDLE_PATH ($(numfmt --to=iec "$BUNDLE_SIZE"))"
        echo "bundle_path=$BUNDLE_PATH" >> "$GITHUB_OUTPUT"
        echo "bundle-size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"

    - name: Upload bundle to Central Portal
      id: upload
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        CENTRAL_USERNAME: ${{ inputs.central-username }}
        CENTRAL_TOKEN: ${{ inputs.central-token }}
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        BUNDLE_PATH="${{ steps.bundle.outputs.bundle_path }}"
        PUBLISHING_TYPE="${{ inputs.publishing-type }}"

        # Generate Bearer token: base64(username:password)
        AUTH_TOKEN=$(echo -n "${CENTRAL_USERNAME}:${CENTRAL_TOKEN}" | base64 -w0)
        echo "::add-mask::$AUTH_TOKEN"

        echo "Uploading bundle to Central Portal (publishingType=$PUBLISHING_TYPE)..."

        RESPONSE=$(curl -sf -X POST \
          "https://central.sonatype.com/api/v1/publisher/upload?publishingType=${PUBLISHING_TYPE}" \
          -H "Authorization: Bearer $AUTH_TOKEN" \
          -F "bundle=@${BUNDLE_PATH};type=application/octet-stream" \
          2>&1) || {
            echo "::error::Upload failed. Response: $RESPONSE"
            exit 1
          }

        # Response is just the deployment ID (plain text)
        DEPLOYMENT_ID="$RESPONSE"
        echo "Deployment ID: $DEPLOYMENT_ID"
        echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

    - name: Poll deployment status
      id: poll
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        CENTRAL_USERNAME: ${{ inputs.central-username }}
        CENTRAL_TOKEN: ${{ inputs.central-token }}
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        DEPLOYMENT_ID="${{ steps.upload.outputs.deployment_id }}"
        TIMEOUT="${{ inputs.poll-timeout }}"
        INTERVAL="${{ inputs.poll-interval }}"

        AUTH_TOKEN=$(echo -n "${CENTRAL_USERNAME}:${CENTRAL_TOKEN}" | base64 -w0)
        echo "::add-mask::$AUTH_TOKEN"

        echo "Polling deployment status (timeout: ${TIMEOUT}s, interval: ${INTERVAL}s)..."

        ELAPSED=0
        FINAL_STATUS="UNKNOWN"

        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          RESPONSE=$(curl -s -X POST \
            "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "  Poll request failed (HTTP $HTTP_CODE), retrying..."
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
            continue
          fi

          STATUS=$(echo "$BODY" | jq -r '.deploymentState // .state // "UNKNOWN"')
          echo "  [$ELAPSED s] Status: $STATUS"

          case "$STATUS" in
            PUBLISHED)
              FINAL_STATUS="PUBLISHED"
              echo "✅ Deployment PUBLISHED successfully!"
              break
              ;;
            VALIDATED)
              FINAL_STATUS="VALIDATED"
              if [ "${{ inputs.publishing-type }}" = "USER_MANAGED" ]; then
                echo "✅ Deployment VALIDATED (USER_MANAGED — not auto-published)"
                break
              fi
              echo "  Waiting for publication..."
              ;;
            FAILED)
              FINAL_STATUS="FAILED"
              echo "::error::Deployment FAILED"
              echo "$BODY" | jq '.errors // .' 2>/dev/null || echo "$BODY"
              exit 1
              ;;
            PENDING|VALIDATING|PUBLISHING)
              # Still in progress
              ;;
            *)
              echo "  Unknown status: $STATUS"
              ;;
          esac

          sleep "$INTERVAL"
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        if [ "$ELAPSED" -ge "$TIMEOUT" ] && [ "$FINAL_STATUS" != "PUBLISHED" ] && \
           [ "$FINAL_STATUS" != "VALIDATED" ]; then
          echo "::error::Timed out waiting for deployment (last status: $FINAL_STATUS)"
          exit 1
        fi

        echo "deployment_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"

    - name: Generate summary
      if: always()
      shell: bash
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## Maven Central Publication

        | | |
        |---|---|
        | **Artifacts** | ${{ steps.validate.outputs.artifact-count }} POM(s) |
        | **Signatures** | ${{ steps.sign.outputs.sign-count }} .asc files |
        | **Bundle Size** | $(numfmt --to=iec ${{ steps.bundle.outputs.bundle-size }} 2>/dev/null || echo "N/A") |
        | **Publishing Type** | ${{ inputs.publishing-type }} |
        | **Dry Run** | ${{ inputs.dry-run }} |
        | **Deployment ID** | ${{ steps.upload.outputs.deployment_id || 'N/A (dry-run)' }} |
        | **Status** | ${{ steps.poll.outputs.deployment_status || 'N/A' }} |
        EOF
